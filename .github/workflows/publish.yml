name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Prod round-trip + cross-container tenant-isolation gate. Publish CANNOT
  # run unless this passes (see `needs: smoke` on the publish job below).
  smoke:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
        env:
          MNEMO_API_KEY: ${{ secrets.MNEMO_API_KEY }}
          MNEMO_WORKSPACE_ID: ${{ secrets.MNEMO_WORKSPACE_ID }}
          MNEMO_TEST_CONTAINER: ${{ secrets.MNEMO_TEST_CONTAINER }}

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
